##
## SigNoz Self-Hosted Observability Stack
##
## Provides: ClickHouse (storage), OTel Collector, Query Service, Frontend UI
## Fracture server sends traces + logs via OTLP HTTP to localhost:4318
##
## Start:  docker compose -f docker-compose.signoz.yml up -d
## Stop:   docker compose -f docker-compose.signoz.yml down
## UI:     http://localhost:3301 (proxied via nginx at signoz.fracture.georgelarson.me)
##

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    restart: unless-stopped
    volumes:
      - signoz-clickhouse:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: signoz
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:0.111.10
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP (used by fracture-server)
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""

  signoz-query-service:
    image: signoz/query-service:0.111.10
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      STORAGE: clickhouse
      ClickHouseUrl: tcp://clickhouse:9000
      SIGNOZ_LOCAL_DB_PATH: /var/lib/signoz/signoz.db
    volumes:
      - signoz-data:/var/lib/signoz

  signoz-frontend:
    image: signoz/frontend:0.111.10
    restart: unless-stopped
    depends_on:
      - signoz-query-service
    ports:
      - "3301:3301"
    environment:
      FRONTEND_API_ENDPOINT: http://signoz-query-service:8080

  signoz-schema-migrator:
    image: signoz/signoz-schema-migrator:0.111.10
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""

volumes:
  signoz-clickhouse:
    driver: local
  signoz-data:
    driver: local
