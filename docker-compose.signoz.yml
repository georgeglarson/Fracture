##
## SigNoz Self-Hosted Observability Stack
##
## Fracture server sends traces + logs via OTLP HTTP to localhost:4318
##
## Start:  docker compose -f docker-compose.signoz.yml up -d
## Stop:   docker compose -f docker-compose.signoz.yml down
## UI:     http://localhost:3301 (SigNoz, proxied via nginx)
## Grafana: http://localhost:3302 (public dashboards, proxied via nginx)
##

x-common: &common
  restart: unless-stopped
  networks:
    - signoz
  logging:
    options:
      max-size: 50m
      max-file: "3"

networks:
  signoz:
    name: signoz

services:
  init-clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-init-clickhouse
    restart: on-failure
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    volumes:
      - ./deploy/common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/

  zookeeper:
    <<: *common
    image: signoz/zookeeper:3.7.1
    container_name: signoz-zookeeper
    user: root
    networks:
      signoz:
        aliases:
          - zookeeper-1
    volumes:
      - signoz-zookeeper:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
      interval: 30s
      timeout: 5s
      retries: 3

  clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-clickhouse
    tty: true
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    volumes:
      - ./deploy/common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./deploy/common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./deploy/common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./deploy/common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ./deploy/common/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - signoz-clickhouse:/var/lib/clickhouse/
    deploy:
      resources:
        limits:
          memory: 2G

  signoz-telemetrystore-migrator:
    <<: *common
    image: signoz/signoz-otel-collector:v0.144.2
    container_name: signoz-telemetrystore-migrator
    restart: on-failure
    depends_on:
      clickhouse:
        condition: service_healthy
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up

  signoz:
    <<: *common
    image: signoz/signoz:v0.115.0
    container_name: signoz
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3301:8080"
    volumes:
      - signoz-sqlite:/var/lib/signoz/
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:-fracture-signoz-secret-change-me}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  otel-collector:
    <<: *common
    image: signoz/signoz-otel-collector:v0.144.2
    container_name: signoz-otel-collector
    depends_on:
      clickhouse:
        condition: service_healthy
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml
    volumes:
      - ./deploy/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "4317:4317"   # gRPC OTLP
      - "4318:4318"   # HTTP OTLP (used by fracture-server)

  grafana:
    <<: *common
    image: grafana/grafana:11.6.0
    container_name: fracture-grafana
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3302:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    environment:
      # Public anonymous read-only access
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Disable login UI for public visitors
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_AUTH_BASIC_ENABLED=true
      # ClickHouse plugin
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
      # Branding
      - GF_SERVER_ROOT_URL=https://fracture-grafana.georgelarson.me
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  signoz-clickhouse:
    driver: local
  signoz-sqlite:
    driver: local
  signoz-zookeeper:
    driver: local
  grafana-data:
    driver: local
